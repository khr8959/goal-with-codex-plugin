<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">goal-dual workflow overview</title>
  <desc id="desc">Claude organizes goals, Codex implements and evaluates, shell runs tests, and the loop continues until the goal is complete or human input is needed.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101828"/>
      <stop offset="0.48" stop-color="#19324A"/>
      <stop offset="1" stop-color="#0F3A3A"/>
    </linearGradient>
    <linearGradient id="accent" x1="176" y1="120" x2="1104" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12" stroke="#B6E8FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowWarm" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12" stroke="#FDE68A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 800 54px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #CBE7F6; }
      .label { font: 800 26px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .body { font: 500 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #D7EEF8; }
      .small { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14343E; }
      .chip { font: 800 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0B1724; }
    </style>
  </defs>

  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <path d="M120 134C248 58 421 78 566 120C728 167 840 128 980 90C1071 65 1163 80 1216 120" stroke="url(#accent)" stroke-width="2" opacity="0.36"/>
  <path d="M80 604C220 538 372 562 520 608C680 658 832 655 978 590C1077 546 1168 544 1232 586" stroke="url(#accent)" stroke-width="2" opacity="0.24"/>

  <text x="80" y="88" class="title">goal-dual</text>
  <text x="82" y="126" class="subtitle">Claude orchestrates. Codex works. Tests decide. The loop keeps moving.</text>

  <g transform="translate(84 176)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#F8FAFC" opacity="0.98"/>
    <rect x="22" y="20" width="78" height="26" rx="13" fill="#DBEAFE"/>
    <text x="39" y="39" class="chip">START</text>
    <text x="24" y="76" class="label" fill="#0F172A">User Goal</text>
    <text x="24" y="104" class="body" fill="#334155">自然言語の依頼</text>
  </g>

  <g transform="translate(400 176)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#17324A" stroke="#7DD3FC" stroke-width="2"/>
    <text x="24" y="46" class="label">Claude</text>
    <text x="24" y="78" class="body">ゴール整理</text>
    <text x="24" y="104" class="body">完了条件・範囲を定義</text>
  </g>

  <g transform="translate(716 176)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#123A37" stroke="#A7F3D0" stroke-width="2"/>
    <text x="24" y="46" class="label">Codex Work</text>
    <text x="24" y="78" class="body">調査・計画・実装</text>
    <text x="24" y="104" class="body">自己レビュー</text>
  </g>

  <g transform="translate(1028 176)" filter="url(#softShadow)">
    <rect width="168" height="126" rx="18" fill="#3B2F16" stroke="#FDE68A" stroke-width="2"/>
    <text x="24" y="46" class="label">Shell</text>
    <text x="24" y="78" class="body">npm test</text>
    <text x="24" y="104" class="body">pytest</text>
  </g>

  <g transform="translate(716 414)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#123A37" stroke="#A7F3D0" stroke-width="2"/>
    <text x="24" y="46" class="label">Codex Eval</text>
    <text x="24" y="78" class="body">complete / incomplete</text>
    <text x="24" y="104" class="body">blocked / regressed</text>
  </g>

  <g transform="translate(400 414)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#17324A" stroke="#7DD3FC" stroke-width="2"/>
    <text x="24" y="46" class="label">Claude Judge</text>
    <text x="24" y="78" class="body">最終判断</text>
    <text x="24" y="104" class="body">続行・完了・停止</text>
  </g>

  <g transform="translate(84 414)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#F8FAFC" opacity="0.98"/>
    <rect x="22" y="20" width="84" height="26" rx="13" fill="#DCFCE7"/>
    <text x="38" y="39" class="chip">DONE</text>
    <text x="24" y="76" class="label" fill="#0F172A">Complete</text>
    <text x="24" y="104" class="body" fill="#334155">PR説明・履歴を生成</text>
  </g>

  <path d="M324 239H392" stroke="#B6E8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M640 239H708" stroke="#B6E8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M956 239H1020" stroke="#B6E8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1112 302V380C1112 434 1068 477 1014 477H964" stroke="#FDE68A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowWarm)"/>
  <path d="M716 477H648" stroke="#B6E8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M400 477H332" stroke="#B6E8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M520 414V360C520 326 548 302 582 302H770C804 302 832 326 832 360V404" stroke="#7DD3FC" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <rect x="568" y="326" width="216" height="36" rx="18" fill="#E0F2FE"/>
  <text x="593" y="350" class="small">incomplete → next iteration</text>

  <rect x="82" y="596" width="1114" height="48" rx="24" fill="#F8FAFC" opacity="0.12" stroke="#D7EEF8" stroke-opacity="0.22"/>
  <text x="112" y="627" class="body">Optional planning path: /goal-dual:plan creates .goal-dual/plan, then /goal-dual:run starts from that plan.</text>
</svg>
