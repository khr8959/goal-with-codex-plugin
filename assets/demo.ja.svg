<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="demo-title demo-desc">
  <title id="demo-title">goal-dual workflow animation</title>
  <desc id="demo-desc">Claude orchestrates Codex work iterations until the goal is complete.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101828"/>
      <stop offset="0.48" stop-color="#19324A"/>
      <stop offset="1" stop-color="#0F3A3A"/>
    </linearGradient>
    <linearGradient id="accent" x1="176" y1="120" x2="1104" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.30"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#7DD3FC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#A7F3D0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <marker id="arrowYellow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#FDE68A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <marker id="arrowDim" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#B6E8FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <marker id="arrowDimWarm" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#FDE68A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <style>
      .title  { font: 800 52px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#F8FAFC; }
      .sub    { font: 500 22px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#CBE7F6; }
      .label  { font: 800 25px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#F8FAFC; }
      .body   { font: 500 17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#D7EEF8; }
      .dklab  { font: 800 25px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#0F172A; }
      .dkbod  { font: 700 17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#334155; }
      .chip   { font: 800 14px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#0B1724; }
      .small  { font: 700 14px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#14343E; }
      .status { font: 600 19px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#F8FAFC; }
      .iter   { font: 800 13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <path d="M120 134C248 58 421 78 566 120C728 167 840 128 980 90C1071 65 1163 80 1216 120" stroke="url(#accent)" stroke-width="2" opacity="0.36"/>
  <path d="M80 604C220 538 372 562 520 608C680 658 832 655 978 590C1077 546 1168 544 1232 586" stroke="url(#accent)" stroke-width="2" opacity="0.24"/>

  <!-- Title -->
  <text x="80" y="86" class="title">goal-dual</text>
  <text x="82" y="124" class="sub">Claude plans. Codex implements. Tests decide. Repeat until done.</text>

  <!-- ── STATIC CARDS ── -->

  <!-- User Goal -->
  <g transform="translate(84 172)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#F8FAFC" opacity="0.98"/>
    <rect x="22" y="20" width="78" height="26" rx="13" fill="#DBEAFE"/>
    <text x="39" y="39" class="chip">START</text>
    <text x="24" y="74" class="dklab">User Goal</text>
    <text x="24" y="101" class="dkbod">自然言語の依頼</text>
  </g>

  <!-- Claude -->
  <g transform="translate(400 172)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#17324A" stroke="#7DD3FC" stroke-width="2"/>
    <text x="24" y="44" class="label">Claude</text>
    <text x="24" y="75" class="body">ゴール整理</text>
    <text x="24" y="101" class="body">完了条件・範囲を定義</text>
  </g>

  <!-- Codex Work -->
  <g transform="translate(716 172)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#123A37" stroke="#A7F3D0" stroke-width="2"/>
    <text x="24" y="44" class="label">Codex Work</text>
    <text x="24" y="75" class="body">調査・計画・実装</text>
    <text x="24" y="101" class="body">自己レビュー</text>
  </g>

  <!-- Shell -->
  <g transform="translate(1028 172)" filter="url(#softShadow)">
    <rect width="168" height="126" rx="18" fill="#3B2F16" stroke="#FDE68A" stroke-width="2"/>
    <text x="24" y="44" class="label">Shell</text>
    <text x="24" y="75" class="body">npm test</text>
    <text x="24" y="101" class="body">pytest</text>
  </g>

  <!-- Codex Eval -->
  <g transform="translate(716 410)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#123A37" stroke="#A7F3D0" stroke-width="2"/>
    <text x="24" y="44" class="label">Codex Eval</text>
    <text x="24" y="75" class="body">complete / incomplete</text>
    <text x="24" y="101" class="body">blocked / regressed</text>
  </g>

  <!-- Claude Judge -->
  <g transform="translate(400 410)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#17324A" stroke="#7DD3FC" stroke-width="2"/>
    <text x="24" y="44" class="label">Claude Judge</text>
    <text x="24" y="75" class="body">最終判断</text>
    <text x="24" y="101" class="body">続行・完了・停止</text>
  </g>

  <!-- Complete -->
  <g transform="translate(84 410)" filter="url(#softShadow)">
    <rect width="240" height="126" rx="18" fill="#F8FAFC" opacity="0.98"/>
    <rect x="22" y="20" width="84" height="26" rx="13" fill="#DCFCE7"/>
    <text x="38" y="39" class="chip">DONE</text>
    <text x="24" y="74" class="dklab">Complete</text>
    <text x="24" y="101" class="dkbod">PR説明・履歴を生成</text>
  </g>

  <!-- ── STATIC ARROWS (dimmed) ── -->
  <path d="M324 235H392" stroke="#B6E8FF" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDim)" opacity="0.22"/>
  <path d="M640 235H708" stroke="#B6E8FF" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDim)" opacity="0.22"/>
  <path d="M956 235H1020" stroke="#B6E8FF" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDim)" opacity="0.22"/>
  <path d="M1112 298V376C1112 430 1068 473 1014 473H964" stroke="#FDE68A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDimWarm)" opacity="0.22"/>
  <path d="M716 473H648" stroke="#B6E8FF" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDim)" opacity="0.22"/>
  <path d="M400 473H332" stroke="#B6E8FF" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDim)" opacity="0.22"/>
  <path d="M520 410V356C520 322 548 298 582 298H770C804 298 832 322 832 356V400" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrowDim)" opacity="0.18"/>
  <rect x="568" y="322" width="216" height="34" rx="17" fill="#E0F2FE" opacity="0.55"/>
  <text x="595" y="344" class="small">incomplete → loop</text>

  <!-- ══════════════════════════════════════════════════
       ANIMATION — 10s cycle

       Timing map (% of 10s):
         0–10%   UserGoal
        10–20%   Claude
        20–33%   CodexWork iter1
        33–44%   Shell iter1
        44–54%   CodexEval iter1
        54–62%   ClaudeJudge iter1
        62–68%   Loop arrow
        68–76%   CodexWork iter2
        76–82%   Shell iter2
        82–87%   CodexEval iter2
        87–92%   ClaudeJudge iter2
        92–100%  DONE
       ══════════════════════════════════════════════════ -->

  <!-- NODE GLOW: UserGoal -->
  <rect x="84" y="172" width="240" height="126" rx="18" fill="rgba(255,255,255,0.12)" stroke="#FFFFFF" stroke-width="5" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.08;0.10;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <!-- NODE GLOW: Claude (10–20%) -->
  <rect x="400" y="172" width="240" height="126" rx="18" fill="rgba(125,211,252,0.12)" stroke="#7DD3FC" stroke-width="5" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.10;0.13;0.18;0.20;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <!-- NODE GLOW: CodexWork (20–33% AND 68–76%) -->
  <rect x="716" y="172" width="240" height="126" rx="18" fill="rgba(167,243,208,0.12)" stroke="#A7F3D0" stroke-width="5" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0;0;1;1;0;0" keyTimes="0;0.20;0.23;0.30;0.33;0.63;0.68;0.71;0.74;0.76;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <!-- NODE GLOW: Shell (33–44% AND 76–82%) -->
  <rect x="1028" y="172" width="168" height="126" rx="18" fill="rgba(253,230,138,0.12)" stroke="#FDE68A" stroke-width="5" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0;0;1;1;0;0" keyTimes="0;0.33;0.36;0.41;0.44;0.73;0.76;0.79;0.80;0.82;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <!-- NODE GLOW: CodexEval (44–54% AND 82–87%) -->
  <rect x="716" y="410" width="240" height="126" rx="18" fill="rgba(167,243,208,0.12)" stroke="#A7F3D0" stroke-width="5" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0;0;1;1;0;0" keyTimes="0;0.44;0.47;0.51;0.54;0.79;0.82;0.845;0.86;0.87;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <!-- NODE GLOW: ClaudeJudge (54–62% AND 87–92%) -->
  <rect x="400" y="410" width="240" height="126" rx="18" fill="rgba(125,211,252,0.12)" stroke="#7DD3FC" stroke-width="5" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0;0;1;1;0;0" keyTimes="0;0.54;0.57;0.60;0.62;0.84;0.87;0.895;0.91;0.92;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <!-- NODE GLOW: DONE (92–100%) -->
  <rect x="84" y="410" width="240" height="126" rx="18" fill="rgba(134,239,172,0.18)" stroke="#86EFAC" stroke-width="6" opacity="0" filter="url(#glowStrong)">
    <animate attributeName="opacity" values="0;0;0.9;1;1" keyTimes="0;0.92;0.95;0.97;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <!-- ── ANIMATED ARROWS ── -->

  <!-- Arrow1: Goal→Claude (8–10%) -->
  <path d="M324 235H392" stroke="#7DD3FC" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="68" stroke-dashoffset="68" marker-end="url(#arrowBlue)" opacity="0">
    <animate attributeName="stroke-dashoffset" values="68;68;0;0" keyTimes="0;0.08;0.10;1" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.08;0.10;0.13;1" dur="16s" repeatCount="indefinite"/>
  </path>

  <!-- Arrow2: Claude→CodexWork (18–20%) -->
  <path d="M640 235H708" stroke="#A7F3D0" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="68" stroke-dashoffset="68" marker-end="url(#arrowGreen)" opacity="0">
    <animate attributeName="stroke-dashoffset" values="68;68;0;0" keyTimes="0;0.18;0.20;1" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.18;0.20;0.23;1" dur="16s" repeatCount="indefinite"/>
  </path>

  <!-- Arrow3: CodexWork→Shell iter1 (31–33%), iter2 (74–76%) -->
  <path d="M956 235H1020" stroke="#A7F3D0" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="64" stroke-dashoffset="64" marker-end="url(#arrowGreen)" opacity="0">
    <animate attributeName="stroke-dashoffset" values="64;64;0;64;64;0;0" keyTimes="0;0.31;0.33;0.40;0.74;0.76;1" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0;0;1;0;0" keyTimes="0;0.31;0.33;0.36;0.74;0.76;0.79;1" dur="16s" repeatCount="indefinite"/>
  </path>

  <!-- Arrow4: Shell→CodexEval iter1 (42–46%), iter2 (80–84%) -->
  <path d="M1112 298V376C1112 430 1068 473 1014 473H964" stroke="#FDE68A" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="300" stroke-dashoffset="300" marker-end="url(#arrowYellow)" opacity="0">
    <animate attributeName="stroke-dashoffset" values="300;300;0;300;300;0;0" keyTimes="0;0.42;0.46;0.54;0.80;0.84;1" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0;0;1;0;0" keyTimes="0;0.42;0.46;0.50;0.80;0.84;0.88;1" dur="16s" repeatCount="indefinite"/>
  </path>

  <!-- Arrow5: CodexEval→ClaudeJudge iter1 (52–54%), iter2 (85–87%) -->
  <path d="M716 473H648" stroke="#7DD3FC" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="68" stroke-dashoffset="68" marker-end="url(#arrowBlue)" opacity="0">
    <animate attributeName="stroke-dashoffset" values="68;68;0;68;68;0;0" keyTimes="0;0.52;0.54;0.60;0.85;0.87;1" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0;0;1;0;0" keyTimes="0;0.52;0.54;0.57;0.85;0.87;0.90;1" dur="16s" repeatCount="indefinite"/>
  </path>

  <!-- LoopArrow: ClaudeJudge→CodexWork (62–68%) — marching ants -->
  <path d="M520 410V356C520 322 548 298 582 298H770C804 298 832 322 832 356V400"
        stroke="#7DD3FC" stroke-width="5" stroke-linecap="round" stroke-dasharray="14 10"
        marker-end="url(#arrowBlue)" opacity="0">
    <animate attributeName="stroke-dashoffset" values="0;-240" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.62;0.64;0.67;0.70;1" dur="16s" repeatCount="indefinite"/>
  </path>

  <!-- Arrow6: ClaudeJudge→DONE (90–92%) -->
  <path d="M400 473H332" stroke="#86EFAC" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="68" stroke-dashoffset="68" marker-end="url(#arrowGreen)" opacity="0">
    <animate attributeName="stroke-dashoffset" values="68;68;0;0" keyTimes="0;0.90;0.92;1" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.90;0.92;1" dur="16s" repeatCount="indefinite"/>
  </path>

  <!-- ── ITERATION BADGE ── -->
  <g opacity="0">
    <rect x="872" y="154" width="62" height="22" rx="11" fill="#065F46"/>
    <text x="884" y="170" class="iter" fill="#A7F3D0">Iter 1</text>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.20;0.23;0.60;0.62;1" dur="16s" repeatCount="indefinite"/>
  </g>
  <g opacity="0">
    <rect x="872" y="154" width="62" height="22" rx="11" fill="#1E3A5F"/>
    <text x="884" y="170" class="iter" fill="#7DD3FC">Iter 2</text>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.68;0.71;0.91;0.92;1" dur="16s" repeatCount="indefinite"/>
  </g>

  <!-- ── STATUS BAR ── -->
  <rect x="82" y="594" width="1114" height="50" rx="25" fill="#F8FAFC" opacity="0.09" stroke="#D7EEF8" stroke-opacity="0.18"/>

  <g opacity="0">
    <circle cx="104" cy="619" r="6" fill="#FFFFFF"/>
    <text x="118" y="625" class="status">Goal received — Preparing...</text>
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.08;0.10;1" dur="16s" repeatCount="indefinite"/>
  </g>

  <g opacity="0">
    <circle cx="104" cy="619" r="6" fill="#7DD3FC"/>
    <text x="118" y="625" class="status">Claude: Clarifying goal and defining completion criteria...</text>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.10;0.13;0.18;0.20;1" dur="16s" repeatCount="indefinite"/>
  </g>

  <g opacity="0">
    <circle cx="104" cy="619" r="6" fill="#A7F3D0"/>
    <text x="118" y="625" class="status">Iteration 1 — Codex: Investigating codebase and implementing...</text>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.20;0.23;0.42;0.44;1" dur="16s" repeatCount="indefinite"/>
  </g>

  <g opacity="0">
    <circle cx="104" cy="619" r="6" fill="#FDE68A"/>
    <text x="118" y="625" class="status" fill="#FDE68A">Shell: Tests failed — Codex Eval: incomplete → looping back...</text>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.44;0.47;0.60;0.62;1" dur="16s" repeatCount="indefinite"/>
  </g>

  <g opacity="0">
    <circle cx="104" cy="619" r="6" fill="#A7F3D0"/>
    <text x="118" y="625" class="status">Iteration 2 — Codex: Applying fix...</text>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.68;0.71;0.82;0.84;1" dur="16s" repeatCount="indefinite"/>
  </g>

  <g opacity="0">
    <circle cx="104" cy="619" r="6" fill="#86EFAC"/>
    <text x="118" y="625" class="status" fill="#A7F3D0">Shell: ✓ PASS — Codex Eval: complete — Goal achieved!</text>
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.87;0.90;0.96;1" dur="16s" repeatCount="indefinite"/>
  </g>

</svg>
